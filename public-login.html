<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>前端登录</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="login-page">
    <div class="login-card">
      <h1>前端登录</h1>
      <p class="login-hint" id="public-login-hint">使用管理员分配的访客账号登录，仅可查看所属组内已发布内容。</p>
      <form id="public-login-form">
        <label>
          <span>用户名</span>
          <input type="text" id="public-login-username" name="username" autocomplete="username" required />
        </label>
        <label>
          <span>密码</span>
          <input type="password" id="public-login-password" name="password" autocomplete="current-password" required />
        </label>
        <p class="login-error" id="public-login-error"></p>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>
      <p class="login-footer"><a href="/login.html" id="public-admin-login-link">管理端登录</a></p>
    </div>
    <script type="module" src="/src/public/login.js"></script>
  </body>
</html>
